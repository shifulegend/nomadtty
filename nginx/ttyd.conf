# NomadTTY — nginx virtual host for terminal.yourdomain.com
# Proxies ttyd and injects the mobile keyboard toolbar (kb.js).
#
# Usage:
#   sudo cp nginx/ttyd.conf /etc/nginx/sites-available/nomadtty
#   sudo ln -s /etc/nginx/sites-available/nomadtty /etc/nginx/sites-enabled/
#   sudo cp src/kb.js /var/www/nomadtty/kb.js
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name terminal.yourdomain.com;   # <-- change this

    access_log /var/log/nginx/nomadtty.access.log;
    error_log  /var/log/nginx/nomadtty.error.log;

    # Serve the mobile keyboard toolbar script
    location = /kb.js {
        root /var/www/nomadtty;
        add_header Cache-Control "no-cache";
    }

    # WebSocket pass-through to ttyd (no modification needed)
    location /ws {
        proxy_pass         http://127.0.0.1:47821;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # Proxy ttyd HTML with mobile toolbar injected into <head>
    location / {
        proxy_pass            http://127.0.0.1:47821;
        proxy_http_version    1.1;
        proxy_set_header Host $host;
        proxy_set_header Accept-Encoding "";

        sub_filter_once on;
        sub_filter '<head>' '<head><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,interactive-widget=resizes-content"><script>!function(){var O=window.WebSocket;function H(u,p){var w=p?new O(u,p):new O(u);if(u&&u.indexOf("/ws")>=0)window._S=w;return w}H.prototype=O.prototype;H.CONNECTING=0;H.OPEN=1;H.CLOSING=2;H.CLOSED=3;window.WebSocket=H}();</script><script src="/kb.js" defer></script>';
    }
}
